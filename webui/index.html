<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Corrode</title>

    <!-- Vendored xterm.js + addons (copied to dist as-is), then loaded as classic
         scripts so their UMD globals exist before the wasm module runs. -->
    <link data-trunk rel="copy-file" href="assets/xterm.js" />
    <link data-trunk rel="copy-file" href="assets/addon-fit.js" />
    <link data-trunk rel="copy-file" href="assets/addon-webgl.js" />
    <link data-trunk rel="copy-file" href="assets/corrode-term.js" />
    <link data-trunk rel="css" href="assets/xterm.css" />
    <!-- KaTeX (js + css + fonts) for the agent console's LaTeX. -->
    <link data-trunk rel="copy-dir" href="assets/katex" />
    <link rel="stylesheet" href="katex/katex.min.css" />
    <link data-trunk rel="rust" data-bin="corrode-webui" data-wasm-opt="z" />
    <script src="xterm.js"></script>
    <script src="addon-fit.js"></script>
    <script src="addon-webgl.js"></script>
    <script src="katex/katex.min.js"></script>
    <script src="katex/contrib/auto-render.min.js"></script>
    <script src="corrode-term.js"></script>

    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 14px/1.4 ui-sans-serif, system-ui, sans-serif;
        background: #14161a; color: #d7dbe0;
        display: flex; flex-direction: column;
      }
      .topbar {
        padding: 8px 14px; background: #0f1114; border-bottom: 1px solid #262a30;
      }
      .brand { color: #e08a4b; font-weight: 700; }
      .cols {
        flex: 1; min-height: 0;
        display: grid; grid-template-columns: 240px 1fr 340px;
      }
      section { min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
      .explorer { border-right: 1px solid #262a30; }
      .agent { border-left: 1px solid #262a30; }
      .bar {
        display: flex; justify-content: space-between; align-items: center;
        padding: 6px 10px; border-bottom: 1px solid #262a30; color: #8b929c;
      }
      button {
        background: #262a30; color: #d7dbe0; border: 1px solid #363b42;
        border-radius: 5px; padding: 3px 9px; cursor: pointer;
      }
      button:hover { background: #303640; }
      .tree { list-style: none; margin: 0; padding: 6px; overflow: auto; }
      .tree li { padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
      .tree li.dir { color: #cbd3dd; }
      .tree li:hover { background: #1c1f24; }

      /* Center column: xterm terminal (top) + egui graph canvas (bottom). */
      .center { background: #0c0d10; }
      .terminal {
        flex: 3; min-height: 0; padding: 6px 8px; overflow: hidden;
        border-bottom: 1px solid #262a30;
      }
      .terminal .xterm, .terminal .xterm-viewport { height: 100% !important; }
      .graph-canvas { flex: 2; width: 100%; min-height: 0; display: block; }

      .log { flex: 1; overflow: auto; padding: 8px 10px; }
      .log .msg { padding: 5px 0; border-bottom: 1px solid #1c1f24; }
      .log .msg:last-child { border-bottom: 0; }
      .log .msg :first-child { margin-top: 0; }
      .log .msg :last-child { margin-bottom: 0; }
      .log pre {
        background: #0f1114; border: 1px solid #262a30; border-radius: 5px;
        padding: 8px; overflow-x: auto; font-family: ui-monospace, monospace;
      }
      .log code { font-family: ui-monospace, monospace; }
      .log .katex-display { margin: 6px 0; overflow-x: auto; overflow-y: hidden; }
      .prompt { display: flex; gap: 6px; padding: 8px; border-top: 1px solid #262a30; }
      .prompt input {
        flex: 1; background: #0f1114; color: #d7dbe0;
        border: 1px solid #363b42; border-radius: 5px; padding: 5px 8px;
      }
    </style>
  </head>
  <body></body>
</html>
